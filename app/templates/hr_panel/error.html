<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка | KIKI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f5f6fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .error-card { background: white; border-radius: 16px; padding: 3rem; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 420px; }
        .error-card i { font-size: 3rem; color: #ef4444; margin-bottom: 1rem; display: block; }
        .error-card h2 { font-size: 1.3rem; font-weight: 700; color: #1f2937; margin-bottom: 0.75rem; }
        .error-card p { color: #6b7280; margin-bottom: 1.5rem; }
        .error-card a { color: #6366f1; text-decoration: none; font-weight: 600; }
        .error-card a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="error-card">
        <i class="bi bi-shield-exclamation"></i>
        <h2>Доступ запрещён</h2>
        <p>{{ message|default:"У вас нет доступа к этой странице." }}</p>
        <a href="{% url 'login' %}"><i class="bi bi-arrow-left me-1"></i>Вернуться на страницу входа</a>
    </div>
</body>
</html>
