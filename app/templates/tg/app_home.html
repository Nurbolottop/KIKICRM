{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KIKI Work — Задачи</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f1214; color: #e6e9ec; }
    .card { background: #151a1f; border-color: #232a33; }
    .btn-primary { background:#3b82f6; border-color:#3b82f6; }
    .badge-status { font-size: .75rem; }
  </style>
</head>
<body>
<div class="container py-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">Мои задачи</h5>
    <span class="badge bg-secondary" id="userBadge">Telegram WebApp</span>
  </div>

  <div id="tasks"></div>

  <template id="task-tpl">
    <a class="card mb-2 text-decoration-none text-reset" href="#">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <div class="fw-semibold task-desc"></div>
          <small class="text-muted">Заказ: <span class="task-order"></span></small>
        </div>
        <span class="badge badge-status"></span>
      </div>
    </a>
  </template>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  const tg = window.Telegram?.WebApp; 
  tg && tg.expand();

  async function loadTasks() {
    const initData = tg?.initData || '';
    const url = new URL(window.location.origin + '/tg/api/tasks');
    url.searchParams.set('initData', initData);
    const r = await fetch(url.toString());
    const data = await r.json();
    const box = document.getElementById('tasks');
    box.innerHTML = '';
    if (!data.ok) {
      box.innerHTML = `<div class="alert alert-danger">${data.error || 'Ошибка загрузки'}</div>`;
      return;
    }
    if (!data.tasks.length) {
      box.innerHTML = '<div class="alert alert-warning mb-0">Задач нет</div>';
      return;
    }
    const tpl = document.getElementById('task-tpl');
    data.tasks.forEach(t => {
      const node = tpl.content.cloneNode(true);
      const a = node.querySelector('a');
      a.href = `/tg/task/${t.id}?initData=${encodeURIComponent(initData)}`;
      node.querySelector('.task-desc').textContent = t.description;
      node.querySelector('.task-order').textContent = t.order_code;
      const b = node.querySelector('.badge-status');
      if (t.status === 'IN_PROGRESS') { b.className='badge bg-info-subtle text-info badge-status'; b.textContent='В работе'; }
      else if (t.status === 'PENDING_REVIEW') { b.className='badge bg-warning text-dark badge-status'; b.textContent='На проверке'; }
      else { b.className='badge bg-success badge-status'; b.textContent='Готово'; }
      box.appendChild(node);
    });
  }
  loadTasks();
</script>
</body>
</html>
