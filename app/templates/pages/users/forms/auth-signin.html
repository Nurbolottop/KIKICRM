{% extends 'pages/users/include/forms/auth_homepage.html' %}
{% block content %}
{% load static %}

   <!-- <style>
    .card {
        background-color: rgba(255, 255, 255, 0.85); /* белый с прозрачностью */
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        border-radius: 12px;
    }
    </style> -->
    <div class="wrapper">
      <div style="
        position: fixed;
        top: 0; left: 0;
        width: 100vw;
        height: 100vh;
        background: url('/static/assets/images/bg-mountains.jpg') no-repeat center center;
        background-size: cover;
        z-index: -1;">
      </div>

      <section class="login-content">
        <div class="container h-100">
          <div class="row align-items-center justify-content-center h-100">
            <div class="col-md-12 col-lg-6">
              <div class="card">
                <div class="card-body">
                  <a href="/" class="auth-logo d-flex justify-content-center mb-3">
                    <img src="{{settings.icon.url}}" class="img-fluid rounded-normal" alt="logo" style="max-height: 80px;">
                  </a>
                  <h2 class="mb-2 text-center">Вход</h2>
                  <p class="text-center">Пожалуйста, введите свои данные для входа.</p>
    
                  {% if messages %}
                    <div class="alert alert-danger">
                      {% for message in messages %}
                        {{ message }}
                      {% endfor %}
                    </div>
                  {% endif %}
    
                  <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="form-group mb-3">
                      <label class="form-label">Логин</label>
                      <input name="username" class="form-control" type="text" placeholder="Введите логин" required>
                    </div>
    
                    <div class="form-group mb-4">
                      <label class="form-label">Пароль</label>
                      <input name="password" class="form-control" type="password" placeholder="Введите пароль" required>
                    </div>
    
                    <div class="d-flex justify-content-between align-items-center flex-wrap">
                      <button type="submit" class="btn btn-primary">Войти</button>
                    </div>
                  </form>
    
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
{% endblock %}
