{% extends 'pages/users/include/forms/auth_homepage.html' %}
{% block content %}
{% load static %}

    <!-- loader Start -->
    <div id="loading">
      <div id="loading-center" style="background: url('./assets/images/') no-repeat scroll 50%;"></div>
    </div>
    <!-- loader END -->
    <div class="wrapper">
      <section class="login-content">
        <div class="container h-100">
          <div class="row align-items-center justify-content-center h-100">
            <div class="col-md-12 col-lg-6">
              <div class="card">
                <div class="card-body">
                  <a href="./index.html" class="auth-logo">
                    <img src="./assets/images/logo.png" class="img-fluid rounded-normal" alt="logo">
                  </a>
                  <h2 class="mb-2 text-center">Sign In</h2>
                  <p class="text-center">To Keep connected with us please login with your personal info.</p>
                  <form>
                    <div class="row">
                      <div class="col-lg-12">
                        <div class="form-group">
                          <label class="form-label">Email</label>
                          <input class="form-control" type="email" placeholder="admin@example.com">
                        </div>
                      </div>
                      <div class="col-lg-12">
                        <div class="form-group">
                          <label class="form-label">Password</label>
                          <input class="form-control" type="password" placeholder="********">
                        </div>
                      </div>
                      <div class="col-lg-6">
                        <div class="form-check mb-3">
                          <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
                          <label class="form-check-label" for="flexCheckDefault"> Remember Me </label>
                        </div>
                      </div>
                      <div class="col-lg-6">
                        <a href="auth-recoverpw.html" class="text-primary float-md-start float-lg-end">Forgot Password?</a>
                      </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center flex-wrap">
                      <span>Create an Account <a href="auth-sign-up.html" class="text-primary ">Sign Up</a>
                      </span>
                      <button type="submit" class="btn btn-primary" class="text-primary mt-md-0 mt-3">Sign In</button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
{% endblock %}
