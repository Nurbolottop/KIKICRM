{% extends 'pages/users/include/forms/auth_homepage.html' %}
{% block content %}
{% load static %}

    <!-- loader Start -->
    <div id="loading">
      <div id="loading-center" style="background: url('./assets/images/') no-repeat scroll 50%;"></div>
    </div>
    <!-- loader END -->
    <div class="wrapper">
      <section class="login-content">
        <div class="container h-100">
          <div class="row align-items-center justify-content-center h-100">
            <div class="col-md-12 col-lg-6">
              <div class="card">
                <div class="card-body">
                  <a href="/" class="auth-logo d-flex justify-content-center mb-3">
                    <img src="{% static 'images/logo.png' %}" class="img-fluid rounded-normal" alt="logo" style="max-height: 80px;">
                  </a>
                  <h2 class="mb-2 text-center">Вход</h2>
                  <p class="text-center">Пожалуйста, введите свои данные для входа.</p>
    
                  {% if messages %}
                    <div class="alert alert-danger">
                      {% for message in messages %}
                        {{ message }}
                      {% endfor %}
                    </div>
                  {% endif %}
    
                  <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="form-group mb-3">
                      <label class="form-label">Логин</label>
                      <input name="username" class="form-control" type="text" placeholder="Введите логин" required>
                    </div>
    
                    <div class="form-group mb-4">
                      <label class="form-label">Пароль</label>
                      <input name="password" class="form-control" type="password" placeholder="Введите пароль" required>
                    </div>
    
                    <div class="d-flex justify-content-between align-items-center flex-wrap">
                      <button type="submit" class="btn btn-primary">Войти</button>
                    </div>
                  </form>
    
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
{% endblock %}
