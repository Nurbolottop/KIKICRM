<div class="datetime-picker-wrapper">
    <input type="datetime-local" 
           name="{{ widget.name }}" 
           id="{{ widget.attrs.id }}"
           class="{{ widget.attrs.class }}"
           value="{{ widget.value|default:'' }}"
           {% if widget.attrs.placeholder %}placeholder="{{ widget.attrs.placeholder }}"{% endif %}
    >
    <span class="datetime-picker-icon">
        <i class="bi bi-calendar-event"></i>
    </span>
</div>

<style>
.datetime-picker-wrapper {
    position: relative;
}

.datetime-picker-wrapper input {
    padding-right: 40px;
}

.datetime-picker-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #6c757d;
    pointer-events: none;
}

/* Улучшенный стиль для datetime-local */
input[type="datetime-local"] {
    font-family: inherit;
    font-size: 1rem;
    line-height: 1.5;
}

input[type="datetime-local"]::-webkit-calendar-picker-indicator {
    opacity: 0;
    position: absolute;
    width: 100%;
    height: 100%;
    left: 0;
    top: 0;
    cursor: pointer;
}
</style>
