{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - CRM KIKI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo i {
            font-size: 48px;
            color: #667eea;
        }
        .login-logo h2 {
            margin-top: 10px;
            color: #333;
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            width: 100%;
            padding: 12px;
            font-weight: 600;
        }
        .btn-login:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="bi bi-stars"></i>
            <h2>CRM KIKI</h2>
            <p class="text-muted">Система управления клинингом</p>
        </div>
        
        {% if form.errors %}
        <div class="alert alert-danger">
            <i class="bi bi-exclamation-triangle"></i> Неверный телефон или пароль.
        </div>
        {% endif %}
        
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            
            <div class="mb-3">
                <label for="id_username" class="form-label">Телефон</label>
                <input type="text" name="username" id="id_username" class="form-control" 
                       placeholder="+996XXXXXXXXX" required autofocus>
                <div class="form-text">Введите телефон в формате +996XXXXXXXXX</div>
            </div>
            
            <div class="mb-4">
                <label for="id_password" class="form-label">Пароль</label>
                <input type="password" name="password" id="id_password" class="form-control" 
                       placeholder="Введите пароль" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Войти
            </button>
        </form>
        
        <div class="mt-4 text-center">
            <small class="text-muted">
                <i class="bi bi-info-circle"></i> Используйте телефон как логин
            </small>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
