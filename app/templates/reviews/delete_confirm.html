<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удалить отзыв | KIKI CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f5f6fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; display: flex; align-items: center; }
        .confirm-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            padding: 2rem;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }
        .confirm-icon {
            width: 80px;
            height: 80px;
            background: #fee2e2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .confirm-icon i {
            font-size: 2.5rem;
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="confirm-card">
            <div class="confirm-icon">
                <i class="bi bi-exclamation-triangle"></i>
            </div>
            <h4 class="mb-3">Удалить отзыв?</h4>
            <p class="text-muted mb-4">
                Вы уверены, что хотите удалить отзыв по заказу <strong>#{{ review.order.order_code }}</strong>?<br>
                Это действие нельзя отменить.
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-center">
                    <a href="{% url 'review_detail' review.pk %}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-2"></i>Отмена
                    </a>
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-2"></i>Удалить
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
